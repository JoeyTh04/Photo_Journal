<!DOCTYPE html>
<html>
<head>
    <title>{{ title }} - {{ date }}</title>
    <style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f5f2e8;
        min-height: 100vh;
        padding: 20px;
    }
    .container {
        max-width: 800px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        border: 1px solid #d4c9b3;
    }
    h1 {
        color: #2d5a2c;
        margin-bottom: 10px;
        font-weight: 600;
    }
    .date {
        color: #6B8E23;
        font-size: 24px;
        margin-bottom: 20px;
        font-weight: 500;
    }
    .photo-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        margin: 20px 0;
    }
    .photo-card {
        position: relative;
        border: 2px solid #d4c9b3;
        border-radius: 12px;
        overflow: hidden;
        background: #fefcf7;
        transition: all 0.2s;
    }
    .photo-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        border-color: #6B8E23;
    }
    .photo-card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
    }
    .delete-photo {
        position: absolute;
        top: 8px;
        right: 8px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        border: none;
        border-radius: 8px;
        width: 32px;
        height: 32px;
        cursor: pointer;
        font-size: 16px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .delete-photo:hover {
        background: rgba(107, 142, 35, 0.9);
        transform: scale(1.05);
    }
    .notes {
        margin: 20px 0;
    }
    .notes h3 {
        color: #5a4a3a;
        margin-bottom: 10px;
    }
    textarea {
        width: 100%;
        padding: 12px;
        border: 2px solid #d4c9b3;
        border-radius: 12px;
        font-size: 16px;
        font-family: inherit;
        min-height: 150px;
        background: #fefcf7;
        transition: all 0.2s;
    }
    textarea:focus {
        outline: none;
        border-color: #6B8E23;
        background: #f8f6ee;
    }
    button {
        padding: 10px 20px;
        background: #6B8E23;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin: 5px;
        font-weight: 500;
        transition: all 0.2s;
    }
    button:hover {
        background: #5a7a1a;
        transform: translateY(-1px);
    }
    .upload-area {
        border: 2px dashed #d4c9b3;
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        margin: 20px 0;
        cursor: pointer;
        background: #fefcf7;
        transition: all 0.2s;
        color: #5a4a3a;
    }
    .upload-area:hover {
        border-color: #6B8E23;
        background: #f8f6ee;
    }
    .back-button {
        display: inline-block;
        margin-bottom: 20px;
        color: #6B8E23;
        text-decoration: none;
        font-weight: 500;
        transition: all 0.2s;
    }
    .back-button:hover {
        color: #5a7a1a;
        transform: translateX(-2px);
    }
    .message {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #6B8E23;
        color: white;
        padding: 12px 24px;
        border-radius: 10px;
        display: none;
        font-weight: 500;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        z-index: 1000;
        white-space: nowrap;
        text-align: center;
    }
</style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-button">← Back to Calendar</a>
        <h1>📝 Journal Entry</h1>
        <div class="date">{{ date }}</div>
        
        <div class="photo-grid" id="photoGrid">
            {% for photo in entry.photos %}
            <div class="photo-card">
                <img src="{{ photo.url }}" alt="Photo">
                <button class="delete-photo" data-id="{{ photo.id }}">×</button>
            </div>
            {% endfor %}
        </div>
        
        <div class="upload-area" onclick="document.getElementById('photoInput').click()">
            📸 Click here to upload photos
            <input type="file" id="photoInput" accept="image/*" style="display: none" onchange="uploadPhoto(this)">
        </div>
        
        <div class="notes">
            <h3>📔 Notes for this day</h3>
            <textarea id="notes" placeholder="Write your memories here...">{{ entry.notes }}</textarea>
            <button onclick="saveNotes()">💾 Save Notes</button>
        </div>
    </div>
    
    <div id="message" class="message"></div>
    
    <script>
        // Set up delete buttons with event listeners
        document.querySelectorAll('.delete-photo').forEach(button => {
            button.addEventListener('click', function() {
                const photoId = this.getAttribute('data-id');
                deletePhoto(photoId);
            });
        });
        
        function showMessage(msg, isError = false) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.style.backgroundColor = '#fff0e0';
            messageDiv.style.color = '#000000';
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
        
        async function saveNotes() {
            const notes = document.getElementById('notes').value;
            const response = await fetch('/save_entry/{{ date }}', {
                method: 'POST',
                body: new URLSearchParams({notes: notes})
            });
            const result = await response.json();
            if (result.success) {
                showMessage('✅ Notes saved!');
            }
        }
        
        async function uploadPhoto(input) {
            if (input.files.length === 0) return;
            
            const formData = new FormData();
            formData.append('photo', input.files[0]);
            
            const response = await fetch('/upload_photo/{{ date }}', {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            if (result.success) {
                location.reload();
            } else {
                showMessage('❌ Error uploading photo', true);
            }
        }
        
        async function deletePhoto(photoId) {
            if (confirm('Delete this photo?')) {
                const response = await fetch(`/delete_photo/{{ date }}/${photoId}`, {
                    method: 'DELETE'
                });
                const result = await response.json();
                if (result.success) {
                    location.reload();
                }
            }
        }
    </script>
</body>
</html>
